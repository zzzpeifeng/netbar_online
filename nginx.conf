# 网吧数据平台 Nginx 配置
# 使用方法：
# 1. 将此文件复制到 /etc/nginx/sites-available/netbar
# 2. 创建软链接：sudo ln -s /etc/nginx/sites-available/netbar /etc/nginx/sites-enabled/netbar
# 3. 删除默认配置：sudo rm /etc/nginx/sites-enabled/default
# 4. 测试配置：sudo nginx -t
# 5. 重启 Nginx：sudo systemctl restart nginx

server {
    # 监听 80 端口（HTTP）
    listen 80;
    listen [::]:80;
    
    # 接受所有 IP 地址访问（无域名）
    server_name _;
    
    # 日志文件
    access_log /var/log/nginx/netbar_access.log;
    error_log /var/log/nginx/netbar_error.log;
    
    # === 前端静态文件 ===
    location / {
        # 前端构建后的文件目录
        root /data/node_project/netbar_online/frontend/dist;
        index index.html index.htm;
        
        # 支持 Vue Router（SPA 应用）
        try_files $uri $uri/ /index.html;
        
        # 缓存策略（静态资源）
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }
    
    # === 后端 API 代理 ===
    location /api {
        # 代理到后端（PM2 运行的 NestJS 应用）
        proxy_pass http://localhost:3000;
        
        # WebSocket 支持
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        
        # 传递真实客户端 IP
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # 超时设置
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        
        # 禁用缓存
        proxy_cache_bypass $http_upgrade;
    }
    
    # === 安全头 ===
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
}
